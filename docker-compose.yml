# CBDC Payment Gateway Simulator — Docker Compose
# Runs all services locally: postgres, redis, backend (Go), frontend (React/Nginx)
# Start everything: make setup
# Stop everything:  make down

services:

  # ── PostgreSQL — Primary financial data store ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cbdc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cbdc_db
      POSTGRES_USER: cbdc_app
      # Password is loaded from the .env file via the env_file directive below.
      # Never hardcode passwords in docker-compose.yml — it gets committed to git.
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Custom postgres config: increase max_connections for connection pooling
      - ./scripts/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"   # Exposed for local dev tools (DBeaver, psql)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbdc_app -d cbdc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cbdc_net

  # ── Redis — Cache, sessions, rate limiting, pub/sub ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbdc_redis
    restart: unless-stopped
    # requirepass enforces authentication — without this, anyone on the Docker
    # network can access Redis data (sessions, idempotency keys, rate limits).
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cbdc_net

  # ── Database migrations — runs once, then exits ────────────────────────────
  migrate:
    image: migrate/migrate:v4.17.1
    container_name: cbdc_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command: [
      "-path", "/migrations",
      "-database", "postgres://cbdc_app:${DB_PASSWORD}@postgres:5432/cbdc_db?sslmode=disable",
      "up"
    ]
    networks:
      - cbdc_net

  # ── Backend — Go HTTP server ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-1.0.0}
    container_name: cbdc_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./backend/.env
    environment:
      # Override host values for Docker networking
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8081:8080"   # mapped to 8081 — 8080 was already in use on this host
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cbdc_net

  # ── Frontend — React app served by Nginx ─────────────────────────────────
  # Nginx serves the Vite production build and proxies /api/* and /api/v1/ws
  # to the backend container. The browser sees a single origin (port 3000),
  # so no CORS preflight is ever needed.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cbdc_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"
    networks:
      - cbdc_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cbdc_net:
    driver: bridge

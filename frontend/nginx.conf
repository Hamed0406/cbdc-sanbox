# Nginx config for the React PWA frontend.
# Two jobs: serve static files + proxy API/WebSocket requests to Go backend.

server {
    listen 80;
    server_name _;

    # ── React SPA routing ──────────────────────────────────────────────────
    # All routes go to index.html so React Router handles them client-side.
    # Without `try_files`, refreshing on /dashboard would return 404.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Security headers on HTML responses
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "no-referrer" always;
    }

    # ── WebSocket proxy — must come BEFORE the /api/ block ───────────────
    # The WebSocket endpoint lives at /api/v1/ws. Nginx location matching is
    # longest-prefix first, so this more-specific block wins over /api/.
    # Without the Upgrade + Connection headers, Nginx forwards the request as
    # plain HTTP and the backend returns 400 (WebSocket handshake fails).
    location = /api/v1/ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;  # keep long-lived WS connections alive
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    # Forward all /api/* requests to the Go backend.
    # Using a proxy avoids CORS preflight requests entirely —
    # from the browser's perspective, the API is on the same origin.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    # Vite appends a content hash to all asset filenames (e.g., main.a1b2c3.js).
    # When the code changes, the filename changes — so we can safely cache forever.
    # This dramatically reduces repeat-visit load times.
    location ~* \.(js|css|png|svg|ico|woff|woff2|webp)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;  # don't log every static asset hit — reduces log noise
    }

    # ── PWA service worker — must NOT be cached ────────────────────────────
    # Service workers must always be checked for updates on every load.
    # If we cache the SW itself, users won't get updates to it.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}

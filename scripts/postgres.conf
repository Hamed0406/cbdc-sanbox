# PostgreSQL configuration for the CBDC simulator.
# These override defaults in the Docker image.

# Listen on all interfaces so other Docker containers (backend, migrate) can connect.
# Without this, PostgreSQL only accepts connections from localhost inside its own container.
listen_addresses = '*'

# Allow more connections for the connection pool
max_connections = 100

# Logging — log slow queries for performance analysis
log_min_duration_statement = 500  # log queries taking > 500ms
log_checkpoints = on
log_connections = off             # too noisy for dev
log_disconnections = off

# Performance tuning for a development/demo environment
shared_buffers = 128MB
work_mem = 4MB
